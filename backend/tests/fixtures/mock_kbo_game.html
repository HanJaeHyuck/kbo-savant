<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>KBO 게임센터 Mock</title></head>
<body>
<!-- 투구 데이터 테이블 -->
<div id="pitchDetail">
  <table class="tbl-pitch">
    <thead>
      <tr>
        <th>이닝</th><th>구종</th><th>구속</th>
        <th>코스</th><th>볼카운트</th><th>결과</th>
      </tr>
    </thead>
    <tbody>
      <tr class="pitch-row">
        <td class="inning">1</td>
        <td class="pitch-type">직구</td>
        <td class="velocity">148</td>
        <td class="zone">5</td>
        <td class="count">0-0</td>
        <td class="result">스트라이크</td>
      </tr>
      <tr class="pitch-row">
        <td class="inning">1</td>
        <td class="pitch-type">슬라이더</td>
        <td class="velocity">132</td>
        <td class="zone">13</td>
        <td class="count">0-1</td>
        <td class="result">볼</td>
      </tr>
      <tr class="pitch-row">
        <td class="inning">1</td>
        <td class="pitch-type">직구</td>
        <td class="velocity">149</td>
        <td class="zone">2</td>
        <td class="count">1-1</td>
        <td class="result">헛스윙</td>
      </tr>
      <tr class="pitch-row">
        <td class="inning">1</td>
        <td class="pitch-type">체인지업</td>
        <td class="velocity">128</td>
        <td class="zone">6</td>
        <td class="count">1-2</td>
        <td class="result">인플레이</td>
      </tr>
      <tr class="pitch-row">
        <td class="inning">2</td>
        <td class="pitch-type">직구</td>
        <td class="velocity">147</td>
        <td class="zone">5</td>
        <td class="count">2-2</td>
        <td class="result">루킹스트라이크</td>
      </tr>
    </tbody>
  </table>
</div>

<!-- 타구 데이터 테이블 -->
<div id="battedBallDetail">
  <table class="tbl-batted">
    <thead>
      <tr>
        <th>타구속도(km/h)</th><th>발사각(°)</th>
        <th>방향</th><th>결과</th>
        <th>X좌표</th><th>Y좌표</th>
      </tr>
    </thead>
    <tbody>
      <tr class="batted-row">
        <td class="exit-velocity">155.2</td>
        <td class="launch-angle">18.4</td>
        <td class="direction">우</td>
        <td class="result">안타</td>
        <td class="spray-x">45.2</td>
        <td class="spray-y">120.3</td>
      </tr>
      <tr class="batted-row">
        <td class="exit-velocity">145.8</td>
        <td class="launch-angle">-3.2</td>
        <td class="direction">내야</td>
        <td class="result">아웃</td>
        <td class="spray-x">12.1</td>
        <td class="spray-y">30.5</td>
      </tr>
      <tr class="batted-row">
        <td class="exit-velocity">162.1</td>
        <td class="launch-angle">27.5</td>
        <td class="direction">좌</td>
        <td class="result">홈런</td>
        <td class="spray-x">-80.3</td>
        <td class="spray-y">145.2</td>
      </tr>
    </tbody>
  </table>
</div>
</body>
</html>
